<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#1a1a1a; font-family:-apple-system,sans-serif; overflow:hidden; height:100vh; }

    #toolbar {
      position:fixed; top:0; left:0; right:0; z-index:1000;
      height:40px; background:#2d2d2d; display:flex; align-items:center;
      padding:0 16px; gap:12px; border-bottom:1px solid #444;
    }
    #toolbar .logo { color:#f0f0f0; font-weight:600; font-size:13px; }
    #toolbar .sep { width:1px; height:20px; background:#555; }
    #toolbar .frame-name { color:#aaa; font-size:12px; }
    #toolbar .frame-name span { color:#6fb3ff; }
    #toolbar .spacer { flex:1; }
    #toolbar .btn-group { display:flex; gap:6px; }
    .tb-btn {
      background:#444; color:#ccc; border:none; padding:4px 10px;
      border-radius:4px; font-size:11px; cursor:pointer; transition:background .15s;
    }
    .tb-btn:hover { background:#555; color:#fff; }
    .tb-btn.active { background:#6fb3ff; color:#fff; }

    #stage {
      position:fixed; top:40px; left:0; right:0; bottom:0;
      display:flex; align-items:center; justify-content:center; overflow:auto;
    }
    #stage.nav-open { left:220px; }

    .frame-wrap {
      position:relative; display:none;
      box-shadow:0 8px 40px rgba(0,0,0,.7); width:1440px; flex-shrink:0;
    }
    .frame-wrap.active { display:inline-block; }
    .frame-wrap img { display:block; width:100%; height:auto; }

    .fw-900  { aspect-ratio:1440/900; }
    .fw-960  { aspect-ratio:1440/960; }
    .fw-1100 { aspect-ratio:1440/1100; }

    .hs {
      position:absolute; cursor:pointer;
      background:transparent; border-radius:4px;
      transition:background .12s;
    }
    .hs:hover { background:rgba(111,179,255,.15); outline:1px dashed rgba(111,179,255,.4); }

    .hs[data-tip]:hover::before {
      content:attr(data-tip);
      position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
      background:#111; color:#eee; font-size:10px; white-space:nowrap;
      padding:3px 7px; border-radius:4px; pointer-events:none; z-index:99;
      border:1px solid #333;
    }

    /* ── 脉冲圆点 ─────────────── */
    .dot {
      position:absolute;
      width:10px; height:10px;
      pointer-events:none;
      transform:translate(-50%,-50%);
      z-index:6;
    }
    .dot::before {
      content:'';
      position:absolute;
      width:8px; height:8px; border-radius:50%;
      background:#FF6B2B;
      top:50%; left:50%; transform:translate(-50%,-50%);
      box-shadow:0 0 5px rgba(255,107,43,.9);
    }
    .dot::after {
      content:'';
      position:absolute;
      width:10px; height:10px; border-radius:50%;
      background:rgba(255,107,43,.5);
      top:50%; left:50%; transform:translate(-50%,-50%);
      animation:ping 1.8s ease-out infinite;
    }
    @keyframes ping {
      0%   { transform:translate(-50%,-50%) scale(1);   opacity:.7; }
      70%  { transform:translate(-50%,-50%) scale(3.2); opacity:0; }
      100% { transform:translate(-50%,-50%) scale(3.2); opacity:0; }
    }
    body.hide-dots .dot { display:none; }

    .frame-enter { animation:fadeIn .2s ease; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    #nav-panel {
      position:fixed; top:40px; left:0; bottom:0; width:220px;
      background:#252525; border-right:1px solid #3a3a3a;
      padding:12px 0; overflow-y:auto; z-index:900;
      transform:translateX(-100%); transition:transform .25s ease;
    }
    #nav-panel.open { transform:translateX(0); }
    #nav-panel h3 { color:#888; font-size:10px; text-transform:uppercase; letter-spacing:.8px; padding:0 12px 8px; }
    .nav-item {
      padding:7px 12px; color:#bbb; font-size:12px; cursor:pointer;
      border-left:2px solid transparent; transition:all .12s; line-height:1.3;
    }
    .nav-item:hover { background:#333; color:#fff; }
    .nav-item.active { background:#2a3a50; color:#6fb3ff; border-left-color:#6fb3ff; }
    .nav-sep { height:1px; background:#3a3a3a; margin:6px 0; }

    #zoom-ctrl {
      position:fixed; bottom:16px; right:16px; z-index:1000;
      background:#2d2d2d; border:1px solid #444; border-radius:6px;
      display:flex; align-items:center; overflow:hidden;
    }
    .z-btn {
      background:none; border:none; color:#ccc; width:32px; height:32px;
      font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:background .12s;
    }
    .z-btn:hover { background:#444; color:#fff; }
    #zoom-label { color:#aaa; font-size:11px; padding:0 8px; min-width:44px; text-align:center; }

    /* ── Figma 评论模式 ── */
    body.comment-mode .frame-wrap.active { cursor: crosshair !important; }
    body.comment-mode .hs { pointer-events: none !important; }
    body.comment-mode .dot { display: none !important; }
    .tb-btn.comment-active { background: #FF6B2B !important; color: #fff !important; }

    /* 评论输入弹窗 */
    #comment-popup {
      position:fixed; z-index:2000;
      background:#2d2d2d; border:1px solid #555; border-radius:8px;
      padding:12px; width:300px;
      display:none; box-shadow:0 8px 28px rgba(0,0,0,.6);
    }
    #comment-popup.show { display:block; }
    #comment-popup .cp-frame-hint {
      color:#888; font-size:10px; margin-bottom:8px;
      padding-bottom:6px; border-bottom:1px solid #3a3a3a;
    }
    #comment-popup .cp-frame-hint span { color:#FF6B2B; }
    #comment-name {
      width:100%; background:#1a1a1a; border:1px solid #555; color:#eee;
      padding:7px 10px; border-radius:4px; font-size:12px; margin-bottom:6px;
      font-family:-apple-system,sans-serif; box-sizing:border-box;
    }
    #comment-name:focus { outline:none; border-color:#6fb3ff; }
    #comment-text {
      width:100%; background:#1a1a1a; border:1px solid #555; color:#eee;
      padding:8px; border-radius:4px; font-size:12px; resize:none;
      height:70px; font-family:-apple-system,sans-serif; margin-bottom:8px;
      box-sizing:border-box;
    }
    #comment-text:focus { outline:none; border-color:#FF6B2B; }
    #comment-popup .cp-btns { display:flex; gap:6px; justify-content:flex-end; align-items:center; }
    #comment-popup .cp-shortcut { color:#666; font-size:10px; flex:1; }
    .cp-btn-cancel { background:#444; color:#ccc; border:none; padding:5px 10px; border-radius:4px; cursor:pointer; font-size:11px; }
    .cp-btn-submit { background:#FF6B2B; color:#fff; border:none; padding:5px 12px; border-radius:4px; cursor:pointer; font-size:11px; font-weight:500; }
    .cp-btn-submit:disabled { opacity:.45; cursor:not-allowed; }

    /* 本地 Pin 标记 */
    .c-pin {
      position:absolute; z-index:15; pointer-events:none;
      width:20px; height:20px; border-radius:50% 50% 50% 0;
      background:#FF5722; transform:rotate(-45deg);
      box-shadow:0 2px 6px rgba(0,0,0,.5);
    }
    .c-pin::after {
      content:attr(data-n);
      position:absolute; inset:0; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transform:rotate(45deg);
      color:#fff; font-size:9px; font-weight:700;
    }

    /* Toast 提示 */
    #comment-toast {
      position:fixed; bottom:64px; left:50%; transform:translateX(-50%);
      background:#1e1e1e; color:#eee; padding:8px 18px; border-radius:20px;
      font-size:12px; z-index:4000; border:1px solid #444;
      opacity:0; transition:opacity .25s; pointer-events:none;
      white-space:nowrap;
    }
    #comment-toast.show { opacity:1; }
  </style>

let scale = 1;

const frames = {
  f00: { id:'f00', title:'F00 · 虚拟基金列表' },
  f01: { id:'f01', title:'F01 · 基金实体列表页' },
  f02a: { id:'f02a', title:'F02a · 实体详情·基本信息' },
  f02b: { id:'f02b', title:'F02b · 实体详情·出资人管理' },
  f02c: { id:'f02c', title:'F02c · 实体详情·投资项目' },
  f02d: { id:'f02d', title:'F02d · 实体详情·修改记录' },
  f03: { id:'f03', title:'F03 · 虚拟基金详情+Drawer' },
  f03a: { id:'f03a', title:'F03a · Drawer·出资人' },
  f03b: { id:'f03b', title:'F03b · Drawer·所投项目' },
  f03c: { id:'f03c', title:'F03c · Drawer·修改记录' },
  f04: { id:'f04', title:'F04 · 关联基金弹窗' },
  f05: { id:'f05', title:'F05 · 新建实体表单' },
  f06: { id:'f06', title:'F06 · 编辑实体页面' },
  f07: { id:'f07', title:'F07 · 删除确认弹窗' },
  f08: { id:'f08', title:'F08 · 解除关联确认' },
  f09: { id:'f09', title:'F09 · 出资人新增弹窗' },
  f10: { id:'f10', title:'F10 · 导入弹窗' },
};

function goto(fid) {
  if (!frames[fid] || fid === currentFrame) return;
  history.push(currentFrame);
  document.getElementById('fw-' + currentFrame).classList.remove('active');
  const next = document.getElementById('fw-' + fid);
  next.classList.add('active','frame-enter');
  setTimeout(() => next.classList.remove('frame-enter'), 300);
  currentFrame = fid;
  document.getElementById('frame-title').textContent = frames[fid].title;
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.frame === fid));
  resetZoom();
}

function goBack() {
  if (!history.length) return;
  const prev = history.pop();
  document.getElementById('fw-' + currentFrame).classList.remove('active');
  const el = document.getElementById('fw-' + prev);
  el.classList.add('active','frame-enter');
  setTimeout(() => el.classList.remove('frame-enter'), 300);
  currentFrame = prev;
  document.getElementById('frame-title').textContent = frames[prev].title;
  document.querySelectorAll('.nav-item').forEach(el =>
    el.classList.toggle('active', el.dataset.frame === prev));
  resetZoom();
}

function toggleNav() {
  navOpen = !navOpen;
  document.getElementById('nav-panel').classList.toggle('open', navOpen);
  document.getElementById('stage').classList.toggle('nav-open', navOpen);
  document.getElementById('nav-toggle').classList.toggle('active', navOpen);
}

function toggleDots() {
  const visible = document.body.classList.toggle('hide-dots');
  document.getElementById('dot-toggle').classList.toggle('active', !visible);
}

function getActiveFrameH() {
  const fw = document.querySelector('.frame-wrap.active');
  if (!fw) return 900;
  const m = fw.className.match(/fw-(\d+)/);
  return m ? parseInt(m[1]) : 900;
}

function zoom(delta) {
  scale = Math.max(0.25, Math.min(2, Math.round((scale+delta)*10)/10));
  applyZoom();
}
function resetZoom() {
  const s = document.getElementById('stage');
  const sw = s.clientWidth-48, sh = s.clientHeight-48;
  scale = Math.min(sw/1440, sh/getActiveFrameH(), 1);
  applyZoom();
}
function applyZoom() {
  const w = Math.round(1440*scale);
  document.querySelectorAll('.frame-wrap').forEach(fw => fw.style.width = w+'px');
  document.getElementById('zoom-label').textContent = Math.round(scale*100)+'%';
}

document.addEventListener('keydown', e => {
  if (e.key==='Backspace'||e.key==='ArrowLeft') goBack();
  if (e.key==='='||e.key==='+') zoom(+0.1);
  if (e.key==='-') zoom(-0.1);
  if (e.key==='0') resetZoom();
  if (e.key==='m'||e.key==='M') toggleNav();
  if (e.key==='h'||e.key==='H') toggleDots();
});

window.addEventListener('load', () => setTimeout(resetZoom, 80));
window.addEventListener('resize', resetZoom);

// ════════════════════════════════════════════════════════
// Figma 评论写回功能
// ════════════════════════════════════════════════════════
const FIGMA_FILE_KEY = 'qCxA7SGLsiD9s3KL4DJCpP';
// 统一服务 Token（评论内容中含评论者姓名，无需 Figma 账号）
const FIGMA_SVC_TOKEN = atob('ZmlnZF9vb2cxTzItcko2Ul9SYnpSeVZJS2t3S3NFMXBIZTFSenowaXI1c3JM');

// 交互稿帧 ID → Figma node ID + 原始尺寸
const FIGMA_NODES = {
  f00:  { nodeId:'8133:86',   w:1440, h:900  },
  f01:  { nodeId:'8103:92',   w:1440, h:900  },
  f02a: { nodeId:'8103:313',  w:1440, h:960  },
  f02b: { nodeId:'8103:457',  w:1440, h:900  },
  f02c: { nodeId:'8103:560',  w:1440, h:900  },
  f02d: { nodeId:'8103:751',  w:1440, h:900  },
  f03:  { nodeId:'8103:867',  w:1440, h:900  },
  f03a: { nodeId:'8180:1109', w:1440, h:900  },
  f03b: { nodeId:'8180:1447', w:1440, h:900  },
  f03c: { nodeId:'8180:1786', w:1440, h:900  },
  f04:  { nodeId:'8103:1063', w:1440, h:900  },
  f05:  { nodeId:'8103:1194', w:1440, h:1100 },
  f06:  { nodeId:'8103:1328', w:1440, h:1100 },
  f07:  { nodeId:'8103:1462', w:1440, h:900  },
  f08:  { nodeId:'8103:1480', w:1440, h:900  },
  f09:  { nodeId:'8103:1500', w:1440, h:900  },
  f10:  { nodeId:'8103:1531', w:1440, h:900  },
};

let commentMode = false;
let pendingClick = null;   // { xPct, yPct, clientX, clientY }
let localPinCount = 0;

// 记住上次用的名字
function getSavedName() { return localStorage.getItem('comment_name') || ''; }
function saveName(n)    { if (n) localStorage.setItem('comment_name', n); }

// ── 评论模式开关 ─────────────────────────────────────────
function toggleCommentMode() {
  commentMode = !commentMode;
  document.body.classList.toggle('comment-mode', commentMode);
  const btn = document.getElementById('comment-toggle');
  btn.classList.toggle('comment-active', commentMode);
  btn.textContent = commentMode ? '✕ Exit Comment' : '💬 Comment';
  if (!commentMode) closeCommentPopup();
}

// ── 捕获点击 ─────────────────────────────────────────────
document.addEventListener('click', e => {
  if (!commentMode) return;
  if (e.target.closest('#toolbar, #comment-popup, #nav-panel, #zoom-ctrl')) return;

  const fw = document.querySelector('.frame-wrap.active');
  if (!fw || !fw.contains(e.target)) return;
  if (e.target.closest('.c-pin')) return;

  e.preventDefault(); e.stopPropagation();

  const rect = fw.getBoundingClientRect();
  const xPct = (e.clientX - rect.left) / rect.width * 100;
  const yPct = (e.clientY - rect.top)  / rect.height * 100;

  pendingClick = { xPct, yPct, clientX: e.clientX, clientY: e.clientY };
  showCommentPopup(e.clientX, e.clientY);
}, true);

// ── 显示评论输入框 ───────────────────────────────────────
function showCommentPopup(clientX, clientY) {
  const popup = document.getElementById('comment-popup');
  document.getElementById('cp-frame-name').textContent = frames[currentFrame]?.title || currentFrame;
  popup.classList.add('show');

  const pw = 300, ph = 168;
  let left = clientX + 14;
  let top  = clientY - 24;
  if (left + pw > window.innerWidth  - 8) left = clientX - pw - 14;
  if (top  + ph > window.innerHeight - 8) top  = window.innerHeight - ph - 8;
  popup.style.left = Math.max(8, left) + 'px';
  popup.style.top  = Math.max(8, top)  + 'px';

  // 还原上次姓名，清空评论
  document.getElementById('comment-name').value = getSavedName();
  const ta = document.getElementById('comment-text');
  ta.value = '';
  // 有名字就聚焦评论区，没有就聚焦姓名区
  (getSavedName() ? ta : document.getElementById('comment-name')).focus();
  document.getElementById('cp-submit').disabled = false;
  document.getElementById('cp-submit').textContent = 'Submit';
}

function closeCommentPopup() {
  document.getElementById('comment-popup').classList.remove('show');
  pendingClick = null;
}

// Ctrl/Cmd+Enter 提交；Esc 取消
document.getElementById('comment-text').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); submitComment(); }
  if (e.key === 'Escape') closeCommentPopup();
});
document.getElementById('comment-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('comment-text').focus();
  if (e.key === 'Escape') closeCommentPopup();
});

// ── 提交评论到 Figma ─────────────────────────────────────
async function submitComment() {
  const name = document.getElementById('comment-name').value.trim();
  const text = document.getElementById('comment-text').value.trim();

  if (!name) { document.getElementById('comment-name').focus(); showToast('请先填写你的名字'); return; }
  if (!text) { document.getElementById('comment-text').focus(); return; }

  const frameInfo = FIGMA_NODES[currentFrame];
  if (!frameInfo) { showToast('❌ 此帧暂不支持评论'); return; }

  saveName(name);

  const { xPct, yPct } = pendingClick;
  const figmaX = Math.round(xPct / 100 * frameInfo.w);
  const figmaY = Math.round(yPct / 100 * frameInfo.h);
  // 评论格式：【姓名】内容
  const message = `【${name}】${text}`;

  const btn = document.getElementById('cp-submit');
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  try {
    const resp = await fetch(`https://api.figma.com/v1/files/${FIGMA_FILE_KEY}/comments`, {
      method: 'POST',
      headers: { 'X-FIGMA-TOKEN': FIGMA_SVC_TOKEN, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message,
        client_meta: { node_id: frameInfo.nodeId, node_offset: { x: figmaX, y: figmaY } }
      })
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.message || `HTTP ${resp.status}`);
    }

    closeCommentPopup();
    showToast(`✓ Comment submitted by ${name}`);
    addLocalPin(xPct, yPct, `[${name}] ${text}`);

  } catch (err) {
    showToast('❌ Failed: ' + err.message);
    btn.disabled = false;
    btn.textContent = 'Submit';
  }
}

// ── 本地 Pin 视觉反馈 ────────────────────────────────────
function addLocalPin(xPct, yPct, text) {
  const fw = document.querySelector('.frame-wrap.active');
  if (!fw) return;
  localPinCount++;
  const pin = document.createElement('div');
  pin.className = 'c-pin';
  pin.dataset.n = localPinCount;
  pin.title = text;
  // Pin 尖端指向点击位置
  pin.style.left = `calc(${xPct}% - 10px)`;
  pin.style.top  = `calc(${yPct}% - 20px)`;
  fw.appendChild(pin);
}

// ── Toast 通知 ───────────────────────────────────────────
let toastTimer = null;
function showToast(msg, duration = 3500) {
  const t = document.getElementById('comment-toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), duration);
}
</script>
