  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a1a; font-family: -apple-system, sans-serif; overflow: hidden; height: 100vh; }

    /* ---- 顶部工具栏 ---- */
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      height: 40px; background: #2d2d2d; display: flex; align-items: center;
      padding: 0 16px; gap: 12px; border-bottom: 1px solid #444;
    }
    #toolbar .logo { color: #f0f0f0; font-weight: 600; font-size: 13px; letter-spacing: .3px; }
    #toolbar .sep { width: 1px; height: 20px; background: #555; }
    #toolbar .frame-name { color: #aaa; font-size: 12px; transition: color .2s; }
    #toolbar .frame-name span { color: #6fb3ff; }
    #toolbar .spacer { flex: 1; }
    #toolbar .btn-group { display: flex; gap: 6px; }
    .tb-btn {
      background: #444; color: #ccc; border: none; padding: 4px 10px;
      border-radius: 4px; font-size: 11px; cursor: pointer; transition: background .15s;
    }
    .tb-btn:hover { background: #555; color: #fff; }
    .tb-btn.active { background: #6fb3ff; color: #fff; }

    /* ---- 主容器 ---- */
    #stage {
      position: fixed; top: 40px; left: 0; right: 0; bottom: 0;
      display: flex; align-items: center; justify-content: center;
      overflow: auto;
    }

    /* ---- Frame容器 ---- */
    .frame-wrap {
      position: relative; display: none;
      box-shadow: 0 8px 40px rgba(0,0,0,.7);
      width: 1440px; flex-shrink: 0;
    }
    .frame-wrap.active { display: inline-block; }
    .frame-wrap img { display: block; width: 100%; height: auto; }

    /* Aspect-ratio helpers for correct hotspot % positioning */
    .fw-900  { aspect-ratio: 1440/900; }
    .fw-960  { aspect-ratio: 1440/960; }
    .fw-1100 { aspect-ratio: 1440/1100; }
    .fw-878  { aspect-ratio: 1440/878; }

    /* ---- 热区 ---- */
    .hs {
      position: absolute; cursor: pointer;
      background: transparent;
      border-radius: 4px;
      transition: background .12s;
    }
    .hs:hover { background: rgba(111, 179, 255, 0.18); }

    /* ---- 热区 tooltip ---- */
    .hs[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute; bottom: calc(100% + 6px); left: 50%; transform: translateX(-50%);
      background: #222; color: #eee; font-size: 11px; white-space: nowrap;
      padding: 3px 8px; border-radius: 4px; pointer-events: none; z-index: 99;
    }

    /* ---- 过渡动画 ---- */
    .frame-enter { animation: fadeIn .22s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    /* ---- 导航面板 ---- */
    #nav-panel {
      position: fixed; top: 40px; left: 0; bottom: 0; width: 200px;
      background: #252525; border-right: 1px solid #3a3a3a;
      padding: 12px 0; overflow-y: auto; z-index: 900;
      transform: translateX(-100%); transition: transform .25s ease;
    }
    #nav-panel.open { transform: translateX(0); }
    #nav-panel h3 { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: .8px; padding: 0 12px 8px; }
    .nav-item {
      padding: 7px 12px; color: #bbb; font-size: 12px; cursor: pointer;
      border-left: 2px solid transparent; transition: all .12s; line-height: 1.3;
    }
    .nav-item:hover { background: #333; color: #fff; }
    .nav-item.active { background: #2a3a50; color: #6fb3ff; border-left-color: #6fb3ff; }
    .nav-sep { height: 1px; background: #3a3a3a; margin: 8px 0; }

    /* ---- 缩放控制 ---- */
    #zoom-ctrl {
      position: fixed; bottom: 16px; right: 16px; z-index: 1000;
      background: #2d2d2d; border: 1px solid #444; border-radius: 6px;
      display: flex; align-items: center; gap: 0; overflow: hidden;
    }
    .z-btn {
      background: none; border: none; color: #ccc; width: 32px; height: 32px;
      font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background .12s;
    }
    .z-btn:hover { background: #444; color: #fff; }
    #zoom-label { color: #aaa; font-size: 11px; padding: 0 8px; min-width: 44px; text-align: center; }

    /* ---- 当前stage下的调整 ---- */
    #stage.nav-open { left: 200px; }
  </style>

<script>
// ---- 状态 ----
let currentFrame = 'f00';
let history = [];
let navOpen = false;
let scale = 1;

const frames = {
  f00:  { id:'f00',  title:'F00 · 虚拟基金列表' },
  f01:  { id:'f01',  title:'F01 · 基金实体列表页' },
  f02a: { id:'f02a', title:'F02a · 实体详情 · 基本信息' },
  f02b: { id:'f02b', title:'F02b · 实体详情 · 出资人管理' },
  f02c: { id:'f02c', title:'F02c · 实体详情 · 投资项目' },
  f02d: { id:'f02d', title:'F02d · 实体详情 · 修改记录' },
  f03:  { id:'f03',  title:'F03 · 虚拟基金详情 + Drawer' },
  f04:  { id:'f04',  title:'F04 · 关联基金弹窗' },
  f05:  { id:'f05',  title:'F05 · 新建实体表单' },
  f06:  { id:'f06',  title:'F06 · 编辑实体页面' },
  f07:  { id:'f07',  title:'F07 · 删除确认弹窗' },
  f08:  { id:'f08',  title:'F08 · 解除关联确认弹窗' },
  f09:  { id:'f09',  title:'F09 · 出资人新增弹窗' },
  f10:  { id:'f10',  title:'F10 · 导入弹窗' },
};

function goto(frameId) {
  if (!frames[frameId]) return;
  if (frameId === currentFrame) return;
  history.push(currentFrame);

  // 隐藏当前
  document.getElementById('fw-' + currentFrame).classList.remove('active');

  // 显示目标
  const next = document.getElementById('fw-' + frameId);
  next.classList.add('active', 'frame-enter');
  setTimeout(() => next.classList.remove('frame-enter'), 300);

  currentFrame = frameId;
  document.getElementById('frame-title').textContent = frames[frameId].title;

  // 更新左侧导航高亮
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.frame === frameId);
  });
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  document.getElementById('fw-' + currentFrame).classList.remove('active');
  const el = document.getElementById('fw-' + prev);
  el.classList.add('active', 'frame-enter');
  setTimeout(() => el.classList.remove('frame-enter'), 300);
  currentFrame = prev;
  document.getElementById('frame-title').textContent = frames[prev].title;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.frame === prev);
  });
}

function toggleNav() {
  navOpen = !navOpen;
  document.getElementById('nav-panel').classList.toggle('open', navOpen);
  document.getElementById('stage').classList.toggle('nav-open', navOpen);
  document.getElementById('nav-toggle').classList.toggle('active', navOpen);
}

// ---- 缩放 ----
// frame height map (original px)
const frameHeights = { fw900:900, fw960:960, fw1100:1100, fw878:878 };

function getActiveFrameH() {
  const fw = document.querySelector('.frame-wrap.active');
  if (!fw) return 900;
  const m = fw.className.match(/fw-(\d+)/);
  return m ? parseInt(m[1]) : 900;
}

function zoom(delta) {
  scale = Math.max(0.25, Math.min(2, Math.round((scale + delta) * 10) / 10));
  applyZoom();
}

function resetZoom() {
  const stage = document.getElementById('stage');
  const stageW = stage.clientWidth - 48;
  const stageH = stage.clientHeight - 48;
  const fh = getActiveFrameH();
  const s = Math.min(stageW / 1440, stageH / fh);
  scale = Math.min(s, 1);
  applyZoom();
}

function applyZoom() {
  const w = Math.round(1440 * scale);
  document.querySelectorAll('.frame-wrap').forEach(fw => {
    fw.style.width = w + 'px';
  });
  document.getElementById('zoom-label').textContent = Math.round(scale * 100) + '%';
}

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (e.key === 'Backspace' || e.key === 'ArrowLeft') goBack();
  if (e.key === '=' || e.key === '+') zoom(+0.1);
  if (e.key === '-') zoom(-0.1);
  if (e.key === '0') resetZoom();
  if (e.key === 'm' || e.key === 'M') toggleNav();
});

// 初始化：适应窗口
window.addEventListener('load', () => {
  setTimeout(resetZoom, 100);
});
window.addEventListener('resize', resetZoom);
</script>
